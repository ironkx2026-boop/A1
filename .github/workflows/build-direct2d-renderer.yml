name: Build Direct2D PDF Renderer

on:
  workflow_dispatch:
  push:
    paths:
      - "Direct2DRenderer/**"
      - ".github/workflows/build-direct2d-renderer.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: cmake -S Direct2DRenderer -B Direct2DRenderer/build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build Direct2DRenderer/build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Direct2DRenderer/artifact | Out-Null
          Copy-Item Direct2DRenderer/build/Release/GpuPdfRenderer.exe Direct2DRenderer/artifact/GpuPdfRenderer.exe
          Copy-Item Direct2DRenderer/README.md Direct2DRenderer/artifact/README.md
          Copy-Item Direct2DRenderer/GpuPdfRenderer.contract.txt Direct2DRenderer/artifact/GpuPdfRenderer.contract.txt

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: GpuPdfRenderer-windows-x64
          path: Direct2DRenderer/artifact/*
